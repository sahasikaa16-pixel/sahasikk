<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strawberry Date Invitation 🍓</title>
    <style>
        :root {
            --bg-cream: #fffaf0;
            --straw-red: #e63946;
            --straw-dark: #b7094c;
            --leaf-green: #2a9d8f;
            --text-dark: #4a5759;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-cream);
            background-image: radial-gradient(var(--straw-red) 1px, transparent 0), radial-gradient(var(--leaf-green) 1px, transparent 0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(230, 57, 70, 0.15);
            border: 3px solid #ffccd5;
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        h1 {
            color: var(--straw-dark);
            font-size: 26px;
            margin-bottom: 20px;
        }

        p {
            color: var(--text-dark);
            font-size: 15px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        #yesBtn {
            background-color: var(--straw-red);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }

        #yesBtn:hover {
            background-color: var(--straw-dark);
        }

        #noBtn {
            background-color: #f1faee;
            color: var(--straw-red);
            border: 2px solid var(--straw-red);
            transition: all 0.1s ease;
        }

        .hidden {
            display: none !important;
        }

        .options-group {
            text-align: left;
            margin-top: 20px;
        }

        .options-group label {
            display: block;
            font-weight: bold;
            color: var(--straw-dark);
            margin-bottom: 8px;
            font-size: 14px;
        }

        select,
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffccd5;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            outline: none;
            background-color: #fffafb;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .strawberry-deco {
            font-size: 45px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Canvas untuk konfeti */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <canvas id="confetti-canvas"></canvas>

    <div id="page1" class="card">
        <div class="strawberry-deco">🍓✨</div>
        <h1>Will you go on a date with me?</h1>
        <p>I promise it'll be as sweet as strawberries!</p>
        <div class="btn-container">
            <button id="yesBtn" onclick="triggerYesEffects()">Yes 🍰</button>
            <button id="noBtn" onmouseover="handleNoInteraction()" onclick="handleNoInteraction()">No</button>
        </div>
    </div>

    <div id="page2" class="card hidden">
        <div class="strawberry-deco">📅🍓</div>
        <h1>When are you free?</h1>
        <p>pilihannya dikit yhh</p>

        <div class="options-group">
            <label for="dateSelect">Available Dates:</label>
            <select id="dateSelect">
                <option value="" disabled selected>-- Pilih Hari Tersedia --</option>
            </select>
        </div>
        <br>
        <button id="yesBtn" style="width: 100%;" onclick="nextPage(3)">Next Steps →</button>
    </div>

    <div id="page3" class="card hidden">
        <div class="strawberry-deco">🗺️🍓</div>
        <h1>Where & What?</h1>
        <p>ur preference</p>

        <div class="options-group">
            <label for="placeSelect">Mau kemana?</label>
            <select id="placeSelect" onchange="toggleOthers('placeSelect', 'placeOthers')">
                <option value="PIM">PIM</option>
                <option value="CP">CP</option>
                <option value="AEON">AEON</option>
                <option value="Others">Others</option>
            </select>
            <input type="text" id="placeOthers" class="hidden" placeholder="Mau ke mana?">

            <label for="foodSelect">Mau makan apa?</label>
            <select id="foodSelect" onchange="toggleOthers('foodSelect', 'foodOthers')">
                <option value="Sushi">Sushi 🍣</option>
                <option value="Ramen/Udon">Ramen / Udon 🍜</option>
                <option value="Korean Food">Korean Food 🍗</option>
                <option value="Thailand Food">Thailand Food 🍲</option>
                <option value="Viral Food">Viral Food 🌮</option>
                <option value="Others">Others</option>
            </select>
            <input type="text" id="foodOthers" class="hidden" placeholder="Mau makan apa?">
        </div>
        <br>
        <button id="yesBtn" style="width: 100%;" onclick="sendToWhatsApp()">Lock Jadwal! 💌</button>
    </div>

    <script>
        let noClickCount = 0;
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const audio = document.getElementById('bgm');

        function handleNoInteraction() {
            noClickCount++;
            // Putar musik pas mulai digodain tombol No-nya
            if (audio.paused) { audio.play().catch(e => console.log("Audio play blocked")); }

            if (noClickCount === 1) {
                moveButton();
            } else if (noClickCount === 2) {
                noBtn.innerText = "Yakin?? 🥺";
                moveButton();
            } else if (noClickCount === 3) {
                noBtn.innerText = "Gak mau dipikir dulu? 💔";
                moveButton();
            } else {
                let currentScale = 1 - ((noClickCount - 3) * 0.25);
                let yesScale = 1 + ((noClickCount - 3) * 0.15);

                if (currentScale <= 0) {
                    noBtn.classList.add('hidden');
                } else {
                    noBtn.style.transform = `scale(${currentScale})`;
                    moveButton();
                }
                yesBtn.style.transform = `scale(${yesScale})`;
            }
        }

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        // --- GENERATE JADWAL ---
        const dateSelect = document.getElementById('dateSelect');
        const availableDates = [
            { text: "Kamis, 25 Juni 2026", value: "Kamis, 25 Juni" },
            { text: "Sabtu, 27 Juni 2026", value: "Sabtu, 27 Juni" },
            { text: "Minggu, 28 Juni 2026", value: "Minggu, 28 Juni" },
            { text: "Sabtu, 4 Juli 2026", value: "Sabtu, 4 Juli" },
            { text: "Minggu, 5 Juli 2026", value: "Minggu, 5 Juli" }
        ];

        availableDates.forEach(date => {
            let opt = document.createElement('option');
            opt.value = date.value;
            opt.innerHTML = date.text;
            dateSelect.appendChild(opt);
        });

        // --- KONFETI EFFECT ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function triggerYesEffects() {
            if (audio.paused) { audio.play().catch(e => console.log("Audio play blocked")); }
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Generate partikel hati/strawberry colors
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    angle: Math.random() * Math.PI * 2,
                    speed: 3 + Math.random() * 7,
                    radius: 4 + Math.random() * 4,
                    color: ['#e63946', '#ffbcca', '#b7094c', '#ff4d6d'][Math.floor(Math.random() * 4)],
                    opacity: 1
                });
            }
            animateConfetti();
            setTimeout(() => { nextPage(2); }, 1000);
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed + 1.5; // efek gravitasi jatuh
                p.opacity -= 0.015;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();

                if (p.opacity <= 0) particles.splice(idx, 1);
            });
            if (particles.length > 0) requestAnimationFrame(animateConfetti);
        }

        function nextPage(pageNumber) {
            if (pageNumber === 3 && !dateSelect.value) {
                alert("Pilih tanggal kosongmu dulu dong! 🍓");
                return;
            }
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.add('hidden');
            document.getElementById('page3').classList.add('hidden');
            document.getElementById(`page${pageNumber}`).classList.remove('hidden');
        }

        function toggleOthers(selectId, inputId) {
            const selectEl = document.getElementById(selectId);
            const inputEl = document.getElementById(inputId);
            if (selectEl.value === 'Others') {
                inputEl.classList.remove('hidden');
                inputEl.required = true;
            } else {
                inputEl.classList.add('hidden');
                inputEl.required = false;
            }
        }

        function sendToWhatsApp() {
            const phone = "628xxxxxxxxxx"; // 👈 GANTI NOMOR LO DI SINI
            const tanggal = dateSelect.value;

            let tempat = document.getElementById('placeSelect').value;
            if (tempat === 'Others') tempat = document.getElementById('placeOthers').value || "Others";

            let makanan = document.getElementById('foodSelect').value;
            if (makanan === 'Others') makanan = document.getElementById('foodOthers').value || "Others";

            const message = `Hi! I'd love to go out with you. 🥰🍓%0A%0AI am free on *${tanggal}*%0ALet's go to *${tempat}*%0Aand grab some *${makanan}*!%0A%0ASee ya! ✨`;
            window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${message}`, '_blank');
        }
    </script>
</body>

</html>
