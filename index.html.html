<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOR VISHA🍓🐟</title>
    <style>
        :root {
            --bg-cream: #fffaf0;
            --straw-red: #e63946;
            --straw-dark: #b7094c;
            --fish-blue: #4ea8de;
            --text-dark: #4a5759;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-cream);
            background-image: radial-gradient(var(--straw-red) 1.5px, transparent 0), radial-gradient(var(--fish-blue) 1.5px, transparent 0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(230, 57, 70, 0.12);
            border: 3px solid #ffccd5;
            text-align: center;
            max-width: 420px;
            width: 90%;
            position: relative;
            z-index: 10;
            box-sizing: border-box;
        }

        h1 {
            color: var(--straw-dark);
            font-size: 26px;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        p {
            color: var(--text-dark);
            font-size: 15px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .btn-primary {
            background-color: var(--straw-red);
            color: white;
            box-shadow: 0 4px 10px rgba(230, 57, 70, 0.3);
        }

        .btn-primary:hover {
            background-color: var(--straw-dark);
        }

        #noBtn {
            background-color: #f1faee;
            color: var(--straw-red);
            border: 2px solid var(--straw-red);
            transition: all 0.1s ease;
            z-index: 20;
        }

        .hidden {
            display: none !important;
        }

        .options-group {
            text-align: left;
            margin-top: 20px;
        }

        .options-group label {
            display: block;
            font-weight: bold;
            color: var(--straw-dark);
            margin-bottom: 8px;
            font-size: 14px;
        }

        select,
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffccd5;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            outline: none;
            background-color: #fffafb;
            box-sizing: border-box;
            margin-bottom: 15px;
            text-align: center;
        }

        .deco-animation {
            font-size: 48px;
            margin-bottom: 10px;
            animation: float-swim 3.5s ease-in-out infinite;
        }

        @keyframes float-swim {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-8px) rotate(3deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>

<body>

    <audio id="bgm" loop>
        <source src="careless-whisper.mp3.mp3" type="audio/mpeg">
    </audio>

    <canvas id="confetti-canvas"></canvas>

    <div id="gatePage" class="card">
        <div class="deco-animation">🔒🍓🐟</div>
        <h1>making sure that this is visha</h1>

        <div class="options-group" style="text-align: center;">
            <label for="nicknameInput">whats ur nickname:</label>
            <input type="password" id="nicknameInput" placeholder="Ketik di sini..." autocomplete="off">
        </div>
        <button class="btn-primary" style="width: 100%; margin-top: 10px;" onclick="checkSecretGate()">Unlock Undangan
            🔓</button>
    </div>

    <div id="page1" class="card hidden">
        <div class="deco-animation">🍓🐟✨</div>
        <h1>Will you go on a date with me?</h1>

        <div class="btn-container">
            <button id="yesBtn" class="btn-primary" onclick="triggerYesEffects()">Yes 🍰</button>
            <button id="noBtn" onmouseover="handleNoInteraction()" onclick="handleNoInteraction()">No</button>
        </div>
    </div>

    <div id="page2" class="card hidden">
        <div class="deco-animation">📅🐟🍓</div>
        <h1>When are you free?</h1>
        <p>pilihannya dikit yhh</p>

        <div class="options-group">
            <label for="dateSelect">Available Dates:</label>
            <select id="dateSelect">
                <option value="" disabled selected>-- Pilih Hari Tersedia --</option>
            </select>
        </div>
        <br>
        <button class="btn-primary" style="width: 100%;" onclick="nextPage(3)">Next Steps →</button>
    </div>

    <form id="page3" class="card hidden" action="https://formsubmit.co/sahasikaa16@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">

        <div class="deco-animation">🐟🍓🗺️</div>
        <h1>Where & What?</h1>
        <p>ur preference</p>

        <div class="options-group">
            <label for="placeSelect">Mau kemana?</label>
            <select id="placeSelect" name="Tempat_Date" onchange="toggleOthers('placeSelect', 'placeOthers')">
                <option value="PIM">PIM</option>
                <option value="CP">CP</option>
                <option value="AEON">AEON</option>
                <option value="Others">Others</option>
            </select>
            <input type="text" id="placeOthers" name="Tempat_Lainnya" class="hidden" placeholder="Mau ke mana?">

            <label for="foodSelect">Mau makan apa?</label>
            <select id="foodSelect" name="Menu_Makanan" onchange="toggleOthers('foodSelect', 'foodOthers')">
                <option value="Sushi">Sushi 🍣🐟</option>
                <option value="Ramen/Udon">Ramen / Udon 🍜</option>
                <option value="Korean Food">Korean Food 🍗</option>
                <option value="Thailand Food">Thailand Food 🍲</option>
                <option value="Viral Food">Viral Food 🌮</option>
                <option value="Others">Others</option>
            </select>
            <input type="text" id="foodOthers" name="Makanan_Lainnya" class="hidden" placeholder="Mau makan apa?">

            <input type="hidden" id="hiddenDate" name="Tanggal_Free">
        </div>
        <br>
        <button type="submit" class="btn-primary" style="width: 100%;" onclick="submitFormEmail(event)">Lock Jadwal!
            💌</button>
    </form>

    <script>
        let noClickCount = 0;
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const audio = document.getElementById('bgm');

        // --- VALIDASI GERBANG DEPAN ---
        function checkSecretGate() {
            const inputVal = document.getElementById('nicknameInput').value.trim().toLowerCase();

            if (inputVal === "shiva") {
                // Sembunyikan halaman log in, ganti ke undangan utama
                document.getElementById('gatePage').classList.add('hidden');
                document.getElementById('page1').classList.remove('hidden');

                // MURNI KEPICU DI SINI: Pas tombol unlock berhasil diklik dengan password benar
                forcePlayMusic();
            } else {
                alert("Salah ih! Kamu bukan visha asli ya? 🤨 Keluar gak!");
                document.getElementById('nicknameInput').value = "";
            }
        }

        function forcePlayMusic() {
            if (audio && audio.paused) {
                audio.play()
                    .then(() => {
                        console.log("Musik Saksofon Romantis Berputar! 🎷");
                    })
                    .catch(e => {
                        console.log("Browser memblokir autoplay.");
                    });
            }
        }

        function handleNoInteraction() {
            noClickCount++;
            // Memicu musik menyala jika sempat terblokir browser pas transisi tadi
            forcePlayMusic();

            if (noClickCount === 1) {
                moveButton();
            } else if (noClickCount === 2) {
                noBtn.innerText = "Yakin?? 🥺";
                moveButton();
            } else if (noClickCount === 3) {
                noBtn.innerText = "Gak mau dipikir dulu? 💔";
                moveButton();
            } else {
                let currentScale = 1 - ((noClickCount - 3) * 0.20);
                let yesScale = 1 + ((noClickCount - 3) * 0.15);

                if (currentScale <= 0.2) {
                    noBtn.classList.add('hidden');
                } else {
                    noBtn.style.transform = `scale(${currentScale})`;
                    moveButton();
                }
                yesBtn.style.transform = `scale(${yesScale})`;
            }
        }

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40);
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.max(10, x) + 'px';
            noBtn.style.top = Math.max(10, y) + 'px';
        }

        // --- PILIHAN JADWAL TANGGAL ---
        const dateSelect = document.getElementById('dateSelect');
        const availableDates = [
            { text: "Kamis, 25 Juni 2026", value: "Kamis, 25 Juni" },
            { text: "Sabtu, 27 Juni 2026", value: "Sabtu, 27 Juni" },
            { text: "Minggu, 28 Juni 2026", value: "Minggu, 28 Juni" },
            { text: "Sabtu, 4 Juli 2026", value: "Sabtu, 4 Juli" },
            { text: "Minggu, 5 Juli 2026", value: "Minggu, 5 Juli" }
        ];

        availableDates.forEach(date => {
            let opt = document.createElement('option');
            opt.value = date.value;
            opt.innerHTML = date.text;
            dateSelect.appendChild(opt);
        });

        // --- KONFETI WARNA STROBERI & LAUT ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function triggerYesEffects() {
            forcePlayMusic();
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: window.innerWidth / 2,
                    y: window.innerHeight / 2,
                    angle: Math.random() * Math.PI * 2,
                    speed: 3 + Math.random() * 7,
                    radius: 4 + Math.random() * 4,
                    color: ['#e63946', '#ffbcca', '#4ea8de', '#0077b6'][Math.floor(Math.random() * 4)],
                    opacity: 1
                });
            }
            animateConfetti();
            setTimeout(() => { nextPage(2); }, 1000);
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, idx) => {
                p.x += Math.cos(p.angle) * p.speed;
                p.y += Math.sin(p.angle) * p.speed + 1.5;
                p.opacity -= 0.015;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.opacity;
                ctx.fill();

                if (p.opacity <= 0) particles.splice(idx, 1);
            });
            if (particles.length > 0) requestAnimationFrame(animateConfetti);
        }

        function nextPage(pageNumber) {
            if (pageNumber === 3 && !dateSelect.value) {
                alert("Pilih tanggal kosongmu dulu dong! 🍓🐟");
                return;
            }
            document.getElementById('gatePage').classList.add('hidden');
            document.getElementById('page1').classList.add('hidden');
            document.getElementById('page2').classList.add('hidden');
            document.getElementById('page3').classList.add('hidden');
            document.getElementById(`page${pageNumber}`).classList.remove('hidden');
        }

        function toggleOthers(selectId, inputId) {
            const selectEl = document.getElementById(selectId);
            const inputEl = document.getElementById(inputId);
            if (selectEl.value === 'Others') {
                inputEl.classList.remove('hidden');
                inputEl.required = true;
            } else {
                inputEl.classList.add('hidden');
                inputEl.required = false;
            }
        }

        function submitFormEmail(event) {
            const tanggalPilihan = document.getElementById('dateSelect').value;
            document.getElementById('hiddenDate').value = tanggalPilihan;

            if (document.getElementById('placeSelect').value === 'Others') {
                document.getElementById('placeOthers').required = true;
            }
            if (document.getElementById('foodSelect').value === 'Others') {
                document.getElementById('foodOthers').required = true;
            }

            alert("Jawaban kamu sudah dikirim ke email aku ya! See ya! 🥰🍓🐟");
        }
    </script>
</body>

</html>
